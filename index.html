<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Naso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#eaf6ff;
    --bg-mid:#cfe9fb;
    --bg-bottom:#aed8f4;
    --heart-blue:#8ad0f2;
    --heart-lav:#d9b8ef;
    --heart-pink:#f6c9df;
    --navy:#2c4a6b;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    overflow:hidden;
  }
  body{
    font-family:'Quicksand', sans-serif;
    background:linear-gradient(160deg, var(--bg-top), var(--bg-mid) 55%, var(--bg-bottom));
    background-size:220% 220%;
    animation:breathe 14s ease-in-out infinite;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  @keyframes breathe{
    0%,100%{ background-position:0% 0%; }
    50%{ background-position:100% 100%; }
  }

  .particles{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .particle{
    position:absolute;
    bottom:-10%;
    opacity:.4;
    user-select:none;
    animation:float linear infinite;
  }
  @keyframes float{
    to{ transform:translateY(-120vh) translateX(var(--drift,0px)) rotate(20deg); opacity:0; }
  }

  .scene{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:2rem;
  }

  .heart-wrap{
    position:relative;
    width:min(66vw, 300px);
    aspect-ratio:1/0.9;
    animation:heartbeat 1.8s ease-in-out infinite;
  }
  @keyframes heartbeat{
    0%,100%{ transform:scale(1); }
    14%{ transform:scale(1.07); }
    28%{ transform:scale(1); }
    42%{ transform:scale(1.07); }
    70%{ transform:scale(1); }
  }

  .heart-wrap::before{
    content:'';
    position:absolute;
    inset:-25%;
    z-index:-1;
    background:radial-gradient(circle, rgba(255,255,255,.6), rgba(255,255,255,0) 68%);
    filter:blur(8px);
    animation:glow 4s ease-in-out infinite;
  }
  @keyframes glow{
    0%,100%{ opacity:.55; }
    50%{ opacity:1; }
  }

  .heart-svg{
    width:100%;
    height:100%;
    filter:drop-shadow(0 12px 34px rgba(120,190,235,.55));
  }
  .stop1{ stop-color:var(--heart-blue); }
  .stop2{ stop-color:var(--heart-lav); }
  .stop3{ stop-color:var(--heart-pink); }

  .heart-message{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6% 20% 20%;
  }
  .heart-message p{
    font-family:'Caveat', cursive;
    font-weight:700;
    color:var(--navy);
    font-size:clamp(1.05rem, 4.4vw, 1.55rem);
    line-height:1.3;
    text-shadow:0 1px 14px rgba(255,255,255,.7);
  }

  .tagline{
    margin-top:1.6rem;
    font-family:'Caveat', cursive;
    font-weight:600;
    font-size:clamp(1.3rem, 4.8vw, 1.9rem);
    color:var(--navy);
    opacity:0;
    letter-spacing:.02em;
    animation:fadeIn 1.4s ease 1s forwards;
  }
  @keyframes fadeIn{ to{ opacity:.85; } }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="scene">
    <div class="heart-wrap">
      <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop class="stop1" offset="0%"/>
            <stop class="stop2" offset="55%"/>
            <stop class="stop3" offset="100%"/>
          </linearGradient>
        </defs>
        <path d="M50,88 C50,88 5,62 5,32 C5,16 18,3 34,3 C43,3 48,7 50,11 C52,7 57,3 66,3 C82,3 95,16 95,32 C95,62 50,88 50,88 Z" fill="url(#heartGrad)"/>
      </svg>
      <div class="heart-message">
        <p>Би чиний төлөө<br>өөрчлөгдөж чадна аа</p>
      </div>
    </div>
    <div class="tagline">just wait for me</div>
  </div>

<script>
  const box = document.getElementById('particles');
  const glyphs = ['♡','♥'];
  const colors = ['#8ad0f2','#d9b8ef','#f6c9df'];
  const count = 16;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    const size = 10 + Math.random()*16;
    p.style.fontSize = size+'px';
    p.style.color = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = Math.random()*100+'%';
    p.style.setProperty('--drift', (Math.random()*90-45)+'px');
    p.style.animationDuration = (9+Math.random()*9)+'s';
    p.style.animationDelay = (Math.random()*12)+'s';
    box.appendChild(p);
  }
</script>
</body>
</html>
